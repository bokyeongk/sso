spring:
  profiles:
    active: dev
  application:
    name: sso-backend
  datasource:
    url: jdbc:postgresql://192.168.10.30:6543/hubilon_pd
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: msa-service

allowed:
  origin: ${ALLOWED_ORIGIN:http://localhost:5173}

server:
  port: 8080
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
